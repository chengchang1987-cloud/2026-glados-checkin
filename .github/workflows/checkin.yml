name: GLaDOS 2026 Checkin

on:
   #   schedule:
#    # 北京时间 9:30 (UTC 1:30)
#     - cron: '30 1 * * *'
#    # 北京时间 21:30 (UTC 13:30)
#     - cron: '30 13 * * *'
  workflow_dispatch:  # 允许手动触发
#  push:
 #   branches: [main]  # 推送时也触发，保持活跃

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Random Delay (1-10 minutes)
        run: |
          # 生成 0-540 的随机数，然后加上 60
          # 结果范围：60 到 600 秒（即 1 到 10 分钟）
          DELAY=$((RANDOM % 541 + 60))
          echo "随机延迟 $DELAY 秒后开始执行签到..."
          sleep $DELAY
          
      - name: Run Checkin
        run: python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

      - name: Retry on Failure
        if: failure()
        run: |
          echo "First attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
